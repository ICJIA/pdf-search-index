name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Opt into the Node 24 runtime for JS actions ahead of the June 2026 forced
  # upgrade — silences the deprecation warning and verifies our action set
  # under what'll be the default. Action authors who haven't migrated yet
  # would surface here as failures we'd want to know about early.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      # pnpm version is read from package.json's `packageManager` field —
      # don't pass `version:` here, it would conflict with that field.
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm format:check
      - run: pnpm build
      - run: pnpm test
