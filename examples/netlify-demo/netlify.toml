[build]
  base    = "examples/netlify-demo"
  # Build order matters in this pnpm workspace:
  #   1. install everything (creates the workspace symlinks)
  #   2. build @icjia/pdf-search-index → packages/core/dist/   (core has no internal deps)
  #   3. build @icjia/astro-pdf-search-index → packages/astro-pdf-search-index/dist/
  #      (imports from core's dist/ at compile time)
  #   4. build the demo (imports from astro adapter's dist/ at astro.config.ts load)
  # Without steps 2 and 3, Astro fails with
  #   "Failed to resolve entry for package @icjia/astro-pdf-search-index"
  # because the symlinked workspace dep has no dist/.
  command = "pnpm install --frozen-lockfile=false && pnpm -F @icjia/pdf-search-index build && pnpm -F @icjia/astro-pdf-search-index build && pnpm build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  PNPM_VERSION = "10.0.0"

# The build emits a single static JSON index. Cache short — the deploy is
# atomic and a redeploy will invalidate via filename hash on the rest of
# the static bundle, but the JSON keeps its filename across builds.
[[headers]]
  for = "/searchIndex.pdfs.json"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

# The PDFs are content-addressed by filename (their CMS slug contains a
# timestamp) so cache them long.
[[headers]]
  for = "/pdfs/*"
  [headers.values]
    Cache-Control          = "public, max-age=31536000, immutable"
    Content-Disposition    = "inline"
    X-Content-Type-Options = "nosniff"
